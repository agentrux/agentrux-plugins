# Publish Python plugins to PyPI on tag push.
#
# Tag format: <plugin>-v<version>
#   sdk-v0.1.0b1
#   agent-sdk-v0.1.0b1
#
# Requires secret: PYPI_API_TOKEN
#
# 2026-05-02: langflow / temporal plugins were retired. Their PyPI
# packages (langflow-agentrux, temporal-agentrux) are yanked on the
# registry; this workflow no longer triggers for those tags.

name: Publish to PyPI

on:
  push:
    tags:
      - 'sdk-v*'
      - 'agent-sdk-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine plugin from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLUGIN="${TAG%-v*}"
          VERSION="${TAG#*-v}"
          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $PLUGIN v$VERSION"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: ${{ steps.meta.outputs.plugin }}
        run: python -m build

      - name: Publish to PyPI
        working-directory: ${{ steps.meta.outputs.plugin }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
