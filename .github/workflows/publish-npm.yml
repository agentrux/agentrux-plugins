# Publish Node.js plugins to npm on tag push.
#
# Tag format: <plugin>-v<version>
#   openclaw-v0.14.5
#
# Requires secret: NPM_TOKEN
#
# 2026-05-02: n8n / flowise plugins were retired. Their npm packages
# (@agentrux/n8n-plugin, flowise-node-agentrux) are deprecated on the
# registry; this workflow no longer triggers for those tags.

name: Publish to npm

on:
  push:
    tags:
      - 'openclaw-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine plugin from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLUGIN="${TAG%-v*}"
          VERSION="${TAG#*-v}"
          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $PLUGIN v$VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: ${{ steps.meta.outputs.plugin }}
        run: npm install

      - name: Build
        working-directory: ${{ steps.meta.outputs.plugin }}
        run: npm run build

      - name: Publish to npm
        working-directory: ${{ steps.meta.outputs.plugin }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
