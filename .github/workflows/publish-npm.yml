# Publish Node.js plugins to npm on tag push.
#
# Tag format: <plugin>-v<version>
#   openclaw-v0.14.5
#   n8n-v0.4.0
#
# Requires secret: NPM_TOKEN
#
# 2026-05-02: flowise plugin retired (flowise-node-agentrux deprecated on npm).
# 2026-06-01: n8n revived as @agentrux/n8n-nodes-agentrux (current API). The old
#   @agentrux/n8n-plugin name stays deprecated; the new community node publishes
#   from n8n/ on tag n8n-v<version>. The job is generic (plugin = tag prefix).

name: Publish to npm

on:
  push:
    tags:
      - 'openclaw-v*'
      - 'n8n-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine plugin from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLUGIN="${TAG%-v*}"
          VERSION="${TAG#*-v}"
          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $PLUGIN v$VERSION"

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: ${{ steps.meta.outputs.plugin }}
        # --ignore-scripts: these plugins are TS-only (build = tsc, no native deps).
        # A transitive dep (n8n-workflow -> isolated-vm) fails its native gyp build
        # on newer runner Node/V8 and is not needed to publish the community node.
        run: npm install --ignore-scripts

      - name: Build
        working-directory: ${{ steps.meta.outputs.plugin }}
        run: npm run build

      - name: Publish to npm
        working-directory: ${{ steps.meta.outputs.plugin }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
