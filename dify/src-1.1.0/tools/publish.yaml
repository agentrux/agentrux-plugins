identity:
  name: agentrux_publish
  author: agentrux
  label:
    en_US: Publish Event
    ja_JP: イベント発行

description:
  human:
    en_US: Publishes a JSON event to the specified AgenTrux topic
    ja_JP: 指定した AgenTrux トピックに JSON イベントを発行します
  llm: Publish a JSON event to an AgenTrux PubSub topic. Use this to send messages, results, or notifications to other agents. If you do not already know the topic_id, FIRST call agentrux_get_topics(action=write) and use a topic_id (UUID) from its response.

parameters:
  - name: topic_id
    type: string
    required: true
    label:
      en_US: Topic ID
      ja_JP: Topic ID
    human_description:
      en_US: AgenTrux topic id (top_<uuid> or UUID). Use the List Topics tool to find it.
      ja_JP: AgenTrux トピック id（top_<uuid> または UUID）。List Topics ツールで確認できます。
    llm_description: The target AgenTrux topic id (a UUID, optionally prefixed top_). Obtain it from agentrux_get_topics(action=write) and copy the exact topic_id value; do NOT pass a topic name.
    form: llm

  - name: event_type
    type: string
    required: true
    label:
      en_US: Event Type
    human_description:
      en_US: "Event type string (e.g. 'dify.response', 'message.send')"
    llm_description: "Event type string (e.g. 'dify.response', 'message.send')"
    form: llm

  - name: payload_json
    type: string
    required: true
    label:
      en_US: Payload (JSON)
    human_description:
      en_US: JSON string of the event payload
    llm_description: JSON string of the event payload
    form: llm

  - name: correlation_id
    type: string
    required: false
    label:
      en_US: Correlation ID
    human_description:
      en_US: Optional correlation ID for request-reply tracking
    llm_description: Optional correlation ID for request-reply tracking
    form: llm

output_schema:
  type: object
  properties:
    event_id:
      type: string
    sequence_no:
      type: number

extra:
  python:
    source: tools/publish.py
