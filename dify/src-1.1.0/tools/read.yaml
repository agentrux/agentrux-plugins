identity:
  name: agentrux_read
  author: agentrux
  label:
    en_US: Read Events
    ja_JP: イベント読み取り
  description:
    en_US: Read events from an AgenTrux topic
    ja_JP: AgenTrux トピックからイベントを読み取る

description:
  human:
    en_US: Reads recent events from the specified AgenTrux topic
    ja_JP: 指定した AgenTrux トピックから最近のイベントを読み取ります
  llm: Read recent events from an AgenTrux PubSub topic. Use this to check messages, responses, or status updates from other agents. If you do not already know the topic_id, FIRST call agentrux_get_topics(action=read) and use a topic_id (UUID) from its response.

parameters:
  - name: topic_id
    type: string
    required: true
    label:
      en_US: Topic ID
      ja_JP: Topic ID
    human_description:
      en_US: AgenTrux topic id (top_<uuid> or UUID). Use the List Topics tool to find it.
      ja_JP: AgenTrux トピック id（top_<uuid> または UUID）。List Topics ツールで確認できます。
    llm_description: The AgenTrux topic id to read from (a UUID, optionally prefixed top_). Obtain it from agentrux_get_topics(action=read) and copy the exact topic_id value; do NOT pass a topic name.
    form: llm

  - name: limit
    type: number
    required: false
    label:
      en_US: Limit
    human_description:
      en_US: Maximum number of events to return (default 10)
    llm_description: Maximum number of events to return (default 10)
    form: llm
    default: 10

  - name: event_type
    type: string
    required: false
    label:
      en_US: Event Type Filter
    human_description:
      en_US: "Optional: only return events of this type"
    llm_description: "Optional: only return events of this type"
    form: llm

output_schema:
  type: object
  properties:
    count:
      type: number
    events:
      type: array
      items:
        type: object

extra:
  python:
    source: tools/read.py
