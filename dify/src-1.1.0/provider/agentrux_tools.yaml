identity:
  author: agentrux
  name: agentrux_tools
  label:
    en_US: AgenTrux
    ja_JP: AgenTrux
  description:
    en_US: Publish, read, and upload to AgenTrux PubSub topics (OAuth 2.1)
    ja_JP: AgenTrux PubSub トピックへのイベント発行・読み取り・アップロード（OAuth 2.1）
  icon: icon.svg
  tags:
    - utilities

# ---------------------------------------------------------------------------
# Auth: dual support (matches OpenClaw/trigger; SSOT device_code_setup_v1.md §4-2)
#   - oauth_schema       — Authorization Code + PKCE (Dify 1.10+, recommended
#                          when the Dify host has a public OAuth callback)
#   - credentials_for_provider — Activation Code (act_): a single-use code from
#                          the AgenTrux Console is redeemed once via
#                          POST /auth/redeem-activation-code into a Script
#                          credential (crd_/aks_), which the runtime then uses
#                          for grant_type=client_credentials. 1-click setup with
#                          no public callback (good for self-hosted Dify).
#
# Dify allows BOTH to be present; users pick whichever flow matches their
# Dify deployment (Cloud vs self-hosted-without-public-callback).
# device_code / topology flow are intentionally NOT offered for Dify
# (see device_code_setup_v1.md §4-2): tools = activation_code | auth_code+PKCE.
# ---------------------------------------------------------------------------

oauth_schema:
  client_schema:
    - name: base_url
      type: text-input
      required: true
      label:
        en_US: AgenTrux API URL
        ja_JP: AgenTrux API URL
      default: https://api.agentrux.com
      help:
        en_US: Base URL of the AgenTrux API (e.g. https://api.agentrux.com)
        ja_JP: AgenTrux API のベース URL（例 https://api.agentrux.com）
    - name: client_id
      type: secret-input
      required: true
      label:
        en_US: OAuth Client ID
        ja_JP: OAuth クライアント ID
      help:
        en_US: "Issued by POST /oauth/register on the AgenTrux Console (oauth-client_<uuid>)."
        ja_JP: "AgenTrux Console の POST /oauth/register で発行（oauth-client_<uuid>）。"
    - name: client_secret
      type: secret-input
      required: false
      label:
        en_US: OAuth Client Secret (optional)
        ja_JP: OAuth クライアントシークレット（任意）
      help:
        en_US: "Public clients (PKCE) leave blank. Confidential clients paste the secret returned by /oauth/register."
        ja_JP: "Public クライアント（PKCE）の場合は空欄。Confidential クライアントは /oauth/register が返したシークレットを貼り付け。"
  credentials_schema:
    - name: base_url
      type: text-input
      label:
        en_US: AgenTrux API URL
        ja_JP: AgenTrux API URL
    - name: access_token
      type: secret-input
      label:
        en_US: Access Token
        ja_JP: アクセストークン
    - name: refresh_token
      type: secret-input
      label:
        en_US: Refresh Token
        ja_JP: リフレッシュトークン
    - name: expires_at
      type: text-input
      label:
        en_US: Expires At
        ja_JP: 有効期限
    - name: scope
      type: text-input
      label:
        en_US: Scope
        ja_JP: スコープ

credentials_for_provider:
  base_url:
    type: text-input
    required: true
    label:
      en_US: AgenTrux API URL
      ja_JP: AgenTrux API URL
    placeholder:
      en_US: https://api.agentrux.com
    default: https://api.agentrux.com
  activation_code:
    type: secret-input
    required: true
    label:
      en_US: Activation Code
      ja_JP: Activation Code
    help:
      en_US: "Single-use Activation Code from the AgenTrux Console (Scripts -> Issue Activation Code; starts with 'act_'). Redeemed once via POST /auth/redeem-activation-code into a Script credential; re-saving the same code is idempotent via a local 0600 cache."
      ja_JP: "AgenTrux Console で発行した1回限りの Activation Code（Scripts → Issue Activation Code、'act_' で始まる）。POST /auth/redeem-activation-code で Script credential に交換され、同じコードの再保存はローカル 0600 キャッシュで冪等。"
    placeholder:
      en_US: "act_..."

tools:
  - tools/get_topics.yaml
  - tools/publish.yaml
  - tools/read.yaml
  - tools/upload.yaml

extra:
  python:
    source: provider/agentrux_tools.py
